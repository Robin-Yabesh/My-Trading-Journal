<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trading Journal</title>
    <style>
        /* Dark Theme Design */
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
        }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 30px; }
        
        /* Stats Cards */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .card { 
            background: #1e293b; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid #334155; 
        }
        .card h3 { margin: 0; font-size: 14px; color: #94a3b8; text-transform: uppercase; }
        .card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: #4ade80; }

        /* Chart & Journal Layout */
        .main-container { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        .widget-box { 
            background: #1e293b; 
            height: 500px; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #334155; 
        }
    </style>
</head>
<body>

    <h1>TRADING DASHBOARD</h1>

    <!-- Top Stats -->
    <div class="stats-grid">
        <div class="card"><h3>Win Rate</h3><p>65%</p></div>
        <div class="card"><h3>Total Profit</h3><p>+$1,250.00</p></div>
        <div class="card"><h3>Total Trades</h3><p style="color: white;">42</p></div>
        <div class="card"><h3>Risk/Reward</h3><p style="color: #fbbf24;">1:2.5</p></div>
    </div>

    <div class="main-container">
        <!-- Live TradingView Chart -->
        <div class="widget-box">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
                <script type="text/javascript" src="https://tradingview.com" async>
                {
                  "autosize": true,
                  "symbol": "BINANCE:BTCUSDT",
                  "interval": "D",
                  "timezone": "Etc/UTC",
                  "theme": "dark",
                  "style": "1",
                  "locale": "en",
                  "enable_publishing": false,
                  "allow_symbol_change": true,
                  "calendar": false,
                  "support_host": "https://tradingview.com"
                }
                </script>
            </div>
        </div>

        <!-- Journal Section -->
        <div class="widget-box">
            <!-- Replace 'YOUR_LINK_HERE' with your Notion or Google Sheet link -->
            <iframe src="YOUR_LINK_HERE" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

</body>
</html>
